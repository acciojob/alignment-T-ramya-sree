<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>HTML Assignment 3</title>

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
    }

    table {
      margin: 20px auto;
      border-collapse: separate;
      border-spacing: 1px;
      border: 1px solid black;
    }

    td, th {
      border: 1px solid black;
      padding: 1px;
    }

    .center {
      text-align: center;
    }

    .right {
      text-align: right;
    }

    .green {
      background-color: green;
    }

    .blue {
      background-color: blue;
    }

    img {
      width: 100px;
    }
  </style>
</head>

<body>

  <h1>HTML Assignment #3</h1>

  <!-- ================= TABLE 1 ================= -->
  <table id="table-1" class="middle">

    <tr>
      <td id="t11">t11</td>
      <td id="t12">t12</td>
      <td id="t13" class="right">t13</td>
    </tr>

    <tr>
      <td class="center">B1</td>
      <td class="center">B2</td>
      <td class="center right">B3</td>
    </tr>

    <tr>
      <td>C1</td>
      <td>C2</td>
      <td class="right">C3</td>
    </tr>

  </table>

  <!-- ================= TABLE 2 ================= -->
  <table id="table-2" class="middle">

    <tr>
      <td id="t21" colspan="6">Table 2 Header Row</td>
    </tr>

    <tr>
      <td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td>
    </tr>

    <tr>
      <td>7</td><td>8</td><td>9</td><td>10</td><td>11</td><td>12</td>
    </tr>

    <tr>
      <td>13</td><td>14</td><td>15</td><td>16</td><td>17</td><td>18</td>
    </tr>

    <tr>
      <td>19</td><td>20</td><td>21</td><td>22</td><td>23</td><td>24</td>
    </tr>

    <tr>
      <td>25</td><td>26</td><td>27</td><td>28</td><td>29</td><td>30</td>
    </tr>

  </table>

  <!-- ================= TABLE 3 ================= -->
  <table id="table-3" class="middle">

    <tr class="green">
      <td colspan="3">Top Row</td>
    </tr>

    <tr>
      <td id="t-image">
        <img src="https://picsum.photos/200" alt="image">
      </td>
      <td>Middle Content</td>
      <td>Middle Content</td>
    </tr>

    <tr class="blue">
      <td colspan="3">Bottom Row</td>
    </tr>

  </table>

</body>

</html>
